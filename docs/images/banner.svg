<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="RocketNote — a privacy-first code editor for macOS">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0c1438"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Night sky -->
  <rect width="1200" height="320" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="80" cy="40" r="1"/>
    <circle cx="200" cy="80" r="1.3"/>
    <circle cx="350" cy="35" r="0.8"/>
    <circle cx="480" cy="100" r="1"/>
    <circle cx="620" cy="50" r="1.5"/>
    <circle cx="780" cy="90" r="1"/>
    <circle cx="900" cy="40" r="1.2"/>
    <circle cx="1040" cy="70" r="1"/>
    <circle cx="1130" cy="30" r="0.9"/>
    <circle cx="160" cy="160" r="0.8"/>
    <circle cx="540" cy="180" r="1"/>
    <circle cx="860" cy="200" r="1.2"/>
    <circle cx="1080" cy="170" r="0.9"/>
  </g>

  <!-- Star glow around rocket -->
  <circle cx="180" cy="160" r="120" fill="url(#starGlow)" opacity="0.3"/>

  <!-- Rocket -->
  <g transform="translate(140,90)">
    <!-- Flame -->
    <path d="M 35 180 Q 25 220 40 240 Q 50 220 50 200 Q 60 220 70 240 Q 75 220 65 180 Z" fill="url(#flame)"/>
    <!-- Body -->
    <path d="M 40 20 Q 60 -10 80 20 L 80 150 Q 80 170 60 170 Q 40 170 40 150 Z" fill="url(#rocket)"/>
    <!-- Window -->
    <circle cx="60" cy="60" r="14" fill="#0c1438" stroke="#fef3c7" stroke-width="2"/>
    <circle cx="56" cy="56" r="4" fill="#fde047" opacity="0.6"/>
    <!-- Fins -->
    <path d="M 40 130 L 20 170 L 40 160 Z" fill="#dc2626"/>
    <path d="M 80 130 L 100 170 L 80 160 Z" fill="#dc2626"/>
    <!-- Side stripes -->
    <rect x="44" y="95" width="32" height="3" fill="#0c1438" opacity="0.4"/>
    <rect x="44" y="105" width="32" height="3" fill="#0c1438" opacity="0.4"/>
  </g>

  <!-- Lock badge -->
  <g transform="translate(80,210)">
    <circle r="22" fill="#10b981" opacity="0.95"/>
    <circle r="22" fill="none" stroke="#34d399" stroke-width="1"/>
    <path d="M -6 -3 L -6 -8 Q -6 -14 0 -14 Q 6 -14 6 -8 L 6 -3" stroke="#ffffff" stroke-width="2" fill="none"/>
    <rect x="-9" y="-3" width="18" height="13" rx="2" fill="#ffffff"/>
    <circle cy="3" r="1.8" fill="#10b981"/>
  </g>

  <!-- Typography -->
  <g transform="translate(360,110)" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text x="0" y="0" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1.5">RocketNote</text>
    <text x="0" y="38" font-size="18" font-weight="500" fill="#a5b4fc">Fast. Private. Local.</text>
    <text x="0" y="64" font-size="14" fill="#94a3b8">A privacy-first code editor for macOS — Tauri · React · Rust</text>

    <!-- Feature pills -->
    <g transform="translate(0,90)" font-size="11" font-weight="600">
      <g>
        <rect x="0" y="0" width="120" height="26" rx="13" fill="#10b981" opacity="0.18" stroke="#10b981"/>
        <text x="60" y="17" text-anchor="middle" fill="#6ee7b7">AES-256-GCM</text>
      </g>
      <g transform="translate(132,0)">
        <rect x="0" y="0" width="100" height="26" rx="13" fill="#6366f1" opacity="0.18" stroke="#6366f1"/>
        <text x="50" y="17" text-anchor="middle" fill="#a5b4fc">Argon2id</text>
      </g>
      <g transform="translate(244,0)">
        <rect x="0" y="0" width="120" height="26" rx="13" fill="#f97316" opacity="0.18" stroke="#f97316"/>
        <text x="60" y="17" text-anchor="middle" fill="#fdba74">Zero telemetry</text>
      </g>
      <g transform="translate(376,0)">
        <rect x="0" y="0" width="92" height="26" rx="13" fill="#06b6d4" opacity="0.18" stroke="#06b6d4"/>
        <text x="46" y="17" text-anchor="middle" fill="#67e8f9">Local-first</text>
      </g>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect y="316" width="1200" height="4" fill="url(#accent)"/>
</svg>
